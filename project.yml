name: ClaudeKota
options:
  bundleIdPrefix: com.batuhanakpunar
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: "$(ARCHS_STANDARD)"
    INFOPLIST_FILE: ClaudeKota/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.batuhanakpunar.ClaudeKota
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    PROVISIONING_PROFILE_SPECIFIER: ""
    PRODUCT_NAME: ClaudeKota
    LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.8.0"
targets:
  ClaudeKota:
    type: application
    platform: macOS
    sources:
      - path: ClaudeKota
        excludes:
          - "**/*.xcassets/.*"
    resources:
      - path: ClaudeKota/Resources/Assets.xcassets
      - path: ClaudeKota/Resources/Sounds
      - path: ClaudeKota/Resources/Localizable.xcstrings
    dependencies:
      - package: Sparkle
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ClaudeKota/ClaudeKota.entitlements
  ClaudeKotaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeKotaTests
    dependencies:
      - target: ClaudeKota
    settings:
      base:
        PRODUCT_NAME: ClaudeKotaTests
        PRODUCT_MODULE_NAME: ClaudeKotaTests
        PRODUCT_BUNDLE_IDENTIFIER: com.batuhanakpunar.ClaudeKotaTests
        GENERATE_INFOPLIST_FILE: YES
