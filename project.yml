name: ClaudeTakip
options:
  bundleIdPrefix: com.batuhanakpunar
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  developmentLanguage: en
  knownRegions:
    - en
    - tr
    - es
    - fr
    - de
    - it
    - nl
    - ja
    - ko
    - zh-Hans
    - zh-Hant
    - ru
    - ar
    - pt-BR
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: "$(ARCHS_STANDARD)"
    INFOPLIST_FILE: ClaudeTakip/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.batuhanakpunar.ClaudeTakip
    MARKETING_VERSION: "1.3.4"
    CURRENT_PROJECT_VERSION: 18
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    PROVISIONING_PROFILE_SPECIFIER: ""
    PRODUCT_NAME: ClaudeTakip
    LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_APP_SANDBOX: NO
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.8.0"
targets:
  ClaudeTakip:
    type: application
    platform: macOS
    sources:
      - path: ClaudeTakip
    resources:
      - path: ClaudeTakip/Resources/Assets.xcassets
        type: folder
    dependencies:
      - package: Sparkle
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
  ClaudeTakipTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeTakipTests
    dependencies:
      - target: ClaudeTakip
    settings:
      base:
        PRODUCT_NAME: ClaudeTakipTests
        PRODUCT_MODULE_NAME: ClaudeTakipTests
        PRODUCT_BUNDLE_IDENTIFIER: com.batuhanakpunar.ClaudeTakipTests
        GENERATE_INFOPLIST_FILE: YES
